name: AEGIS CI

on:
  push:
    branches: [ main, Shlok, Aditya ]
  pull_request:
    branches: [ main ]

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f backend/requirements.txt ]; then pip install -r backend/requirements.txt; fi
        pip install pytest flake8
    - name: Lint with flake8
      run: |
        if [ -d backend/app ]; then
          # stop the build if there are Python syntax errors or undefined names
          flake8 backend/app --count --select=E9,F63,F7,F82 --show-source --statistics
        else
          echo "backend/app directory not found, skipping linting."
        fi
    - name: Run tests
      run: |
        if [ -d backend/tests ]; then
          # pytest backend/tests/
          echo "No tests implemented yet"
        else
          echo "backend/tests directory not found, skipping tests."
        fi

  frontend-lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
    - name: Install dependencies
      run: |
        if [ -d frontend ]; then
          cd frontend
          npm install
        else
          echo "frontend directory not found, skipping install."
        fi
    - name: Lint
      run: |
        if [ -d frontend ]; then
          cd frontend
          npm run lint || echo "Linting not configured yet"
        else
          echo "frontend directory not found, skipping lint."
        fi
